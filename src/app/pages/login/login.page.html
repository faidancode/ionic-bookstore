<ion-content [fullscreen]="true" class="atheneum-auth-content">
  <div class="auth-wrapper">
    <header class="auth-header">
      <div class="accent-line"></div>
      <h1 class="display-title">Selamat<br /><span>Datang</span></h1>
      <p class="auth-subtitle">Masuk ke arsip pribadi Anda.</p>
    </header>

    <form class="auth-form" (submit)="handleLogin($event)">
      <div class="input-group">
        <label>EMAIL / IDENTITAS</label>
        <div class="input-field">
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="nama@email.com"
            required
          />
        </div>
      </div>

      <div class="input-group">
        <label>KATA SANDI</label>
        <div class="input-field">
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <div class="auth-actions">
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) { Memproses... } @else { Masuk }
        </button>

        <p class="register-link">
          Belum menjadi anggota? <span>Daftar Sekarang</span>
        </p>
      </div>
    </form>
  </div>
</ion-content>
