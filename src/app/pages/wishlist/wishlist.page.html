<ion-header class="ion-no-border">
  <ion-toolbar class="editorial-toolbar">
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/tabs/home"
        text=""
        icon="arrow-back-outline"
      ></ion-back-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="toCart()" class="cart-btn">
        <ion-icon name="bag-handle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="atheneum-content">
  <div class="wishlist-container">
    <header class="page-header">
      <h1 class="display-title">Koleksi<br /><span>Tersimpan</span></h1>
      <p class="subtitle">Buku-buku yang menunggu untuk dibawa pulang.</p>
    </header>

    @if (loading() && !wishlistItems().length) {
    <div class="loading-center">
      <ion-spinner name="lines-sharp"></ion-spinner>
    </div>
    } @else if (wishlistItems().length === 0) {
    <div class="empty-state">
      <ion-icon name="bookmark-outline"></ion-icon>
      <p>Belum ada buku di wishlist Anda.</p>
      <button class="btn-outline" routerLink="/tabs/home">JELAJAHI BUKU</button>
    </div>
    } @else {
    <div class="book-grid">
      @for (item of wishlistItems(); track item.id) {
      <app-book-card [book]="item.book"></app-book-card>
      }
    </div>
    }

    <ion-infinite-scroll [disabled]="true" (ionInfinite)="loadMore($event)">
      <ion-infinite-scroll-content
        loadingSpinner="lines-sharp"
      ></ion-infinite-scroll-content>
    </ion-infinite-scroll>
  </div>
</ion-content>
