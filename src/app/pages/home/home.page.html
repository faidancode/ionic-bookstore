<ion-header class="ion-no-border">
  <app-home-header (openSearch)="presentSearchModal()"></app-home-header>
</ion-header>
<ion-content [fullscreen]="true" [scrollEvents]="true" class="atheneum-content">
  <header class="masthead">
    <div class="date-stamp">VOL. XXIV — ISSUE 04</div>
    <h1 class="brand-title">Atheneum<span>.</span></h1>
    <p class="tagline">Curated thoughts for the modern reader.</p>
  </header>

  <div class="page-wrapper">
    <section class="featured-section">
      <app-category-list></app-category-list>
    </section>

    <section class="book-feed">
      <app-popular-books></app-popular-books>
    </section>
  </div>
</ion-content>
